<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>首页</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/2.2.0/jquery.min.js"></script>

    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
    <style>
        .split{
            margin: 20px auto;
        }
        .content-panel {
            display: none;
        }
        .active-content {
            display: block;
        }
    </style>
    <script src="js/home.js"></script>
</head>
<body>
<div class="container">
    <div class="row split">
        <div class="col-xs-10">
            <h2>极果网后台管理首页</h2>
        </div>
        <div class="col-xs-1 admin-name"></div>
        <div class="col-xs-1">
            <button class="btn btn-xs btn-danger btn-exit">退出</button>
        </div>
    </div>
    <div class="row">
        <div class="col-xs-2">
            <div class="list-group">
                <a class="list-group-item admin-link" >管理员管理</a>
                <a class="list-group-item user-link" >用户管理</a>
                <a class="list-group-item cool-link" >酷玩管理</a>
                <a class="list-group-item guide-link" >导购商品</a>
                <a class="list-group-item try-link" >试用商品</a>
            </div>
        </div>
        <div class="col-xs-10 admin-content">
            <div id="admin">
                <div class="row split">
                    <div class="col-xs-12">
                        <table class="table">
                            <caption>管理员列表</caption>
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>名字</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody class="admin-tbody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="row split">
                    <div class="col-xs-12">
                        <button class="btn btn-success btn-show-form">添加管理员</button>
                    </div>
                </div>
                <div class="row admin-form split">
                    <div class="col-xs-4 col-xs-offset-4">
                        <form>
                            <input class="form-control split" type="text" placeholder="请输入管理员登录名" name="adminname">
                            <input class="form-control split" type="password" placeholder="请输入管理员登录密码" name="adminpass">
                            <button class="btn btn-primary split btn-add" type="button">确认</button>
                            <button class="btn btn-danger split" type="reset">重置</button>
                        </form>
                    </div>
                </div>

            </div>
            <div id="user">
                        <div class="row split">
                            <div class="col-xs-12">
                                <input type="text" placeholder="请输入搜索的用户名" name="username">
                                <button class="btn btn-xs btn-warning glyphicon glyphicon-search btn-user-search">搜索</button>
                            </div>
                        </div>
                        <div class="row split">
                            <div class="col-xs-12">
                                <table class="table">
                                    <caption>用户列表</caption>
                                    <thead>
                                    <tr>
                                        <th>编号</th>
                                        <th>名字</th>
                                        <th>手机</th>
                                        <th>头像</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                    </thead>
                                    <tbody class="user-tbody"></tbody>
                                    <tfoot>
                                    <tr>
                                        <td colspan="6" align="right">
                                            <nav>
                                                <ul class="pagination"></ul>
                                            </nav>
                                        </td>
                                    </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    </div>
            <div id="cool">
                <div class="row split">
                    <div class="col-xs-12">
                        <input type="radio" name="cool-search-type" value="name" checked>
                        <label>根据商品名</label>
                        <input type="radio" name="cool-search-type" value="title" >
                        <label>根据商品标题</label>
                        <input type="text" placeholder="请输入搜索的商品名" name="coolname">
                        <button class="btn btn-xs btn-warning glyphicon glyphicon-search
btn-cool-search">搜索</button>
                    </div>
                </div>
                <div class="row split">
                    <div class="col-xs-12">
                        <table class="table">
                            <caption>酷玩商品列表</caption>
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>名字</th>
                                <th>标题</th>
                                <th>价格</th>
                                <th>图片</th>
                                <th>发布日期</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody class="cool-tbody"></tbody>
                            <tfoot>
                            <tr>
                                <td colspan="7" align="right">
                                    <nav>
                                        <ul class="pagination"></ul>
                                    </nav>
                                </td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="row split">
                    <div class="col-xs-12">
                        <button class="btn btn-success btn-show-form">添加酷玩商品</button>
                    </div>
                </div>
                <div class="row cool-form split">
                    <div class="col-xs-4 col-xs-offset-4">
                        <form class="cool-item-form">
                            <input class="form-control split" type="text" name="id">
                            <input class="form-control split" type="text" placeholder="请输入商品名" name="name">
                            <input class="form-control split" type="text" placeholder="请输入商品标题" name="title">
                            <input class="form-control split" type="number" step="0.01" placeholder="请输入商品价格" name="price">
                            <input class="form-control split" type="file" placeholder="请选择商品图片" name="file">
                            <input class="form-control split" type="date" name="pubDate">
                            <button class="btn btn-primary split btn-add" type="button">确认</button>
                            <button class="btn btn-danger split" type="reset">重置</button>
                        </form>
                    </div>
                </div>
            </div>
            <div id="guide">
                <div class="row split">
                    <div class="col-xs-12">
                        <input type="radio" name="guide-search-type" value="name" checked>
                        <label>根据商品名</label>
                        <input type="radio" name="guide-search-type" value="title" >
                        <label>根据商品标题</label>
                        <input type="text" placeholder="请输入搜索的商品名" name="guidename">
                        <button class="btn btn-xs btn-warning glyphicon glyphicon-search btn-guide-search">搜索</button>
                    </div>
                </div>
                <div class="row split">
                    <div class="col-xs-12">
                        <table class="table">
                            <caption>导购商品列表</caption>
                            <thead>
                            <tr>
                                <th>编号</th>
                                <th>名字</th>
                                <th>标题</th>
                                <th>价格</th>
                                <th>图片</th>
                                <th>发布日期</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody class="guide-tbody"></tbody>
                            <tfoot>
                            <tr>
                                <td colspan="7" align="right">
                                    <nav>
                                        <ul class="pagination"></ul>
                                    </nav>
                                </td>
                            </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
                <div class="row split">
                    <div class="col-xs-12">
                        <button class="btn btn-success btn-show-form">添加导购商品</button>
                    </div>
                </div>
                <div class="row guide-form split">
                    <div class="col-xs-4 col-xs-offset-4">
                        <form class="guide-item-form">
                            <input class="form-control split" type="text" name="id">
                            <input class="form-control split" type="text" placeholder="请输入商品名" name="name">
                            <input class="form-control split" type="text" placeholder="请输入商品标题" name="title">
                            <input class="form-control split" type="number" step="0.01" placeholder="请输入商品价格" name="price">
                            <input class="form-control split" type="file" placeholder="请选择商品图片" name="file">
                            <input class="form-control split" type="date" name="pubDate">
                            <button class="btn btn-primary split btn-add" type="button">确认</button>
                            <button class="btn btn-danger split" type="reset">重置</button>
                        </form>
                    </div>
                </div>
            </div>
            <div id="try">试用管理</div>
        </div>
    </div>
</div>
</body>
</html>
