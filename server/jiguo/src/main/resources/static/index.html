<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/2.2.0/jquery.min.js"></script>

    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">

    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/3.4.1/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>
    <style>
        .split{
            margin: 20px auto;
        }
    </style>
    <script src="js/index.js"></script>
</head>
<body>
    <div class="container">
        <div class="row split">
            <div class="col-xs-8 col-xs-offset-2">
                <h1 class="text-center">jiguo网后台管理系统</h1>
            </div>
        </div>
        <div class="row split">
            <div class="col-xs-4 col-xs-offset-4">
                <input type="text" id="username" placeholder="请输入管理员账号" class="form-control">
            </div>
        </div>
        <div class="row split">
            <div class="col-xs-4 col-xs-offset-4">
                <input type="password" id="password" placeholder="请输入管理员密码" class="form-control">
            </div>
        </div>
        <div class="row split">
            <div class="col-xs-4 col-xs-offset-4">
                <div class="col-xs-6">
                    <button id="loginBtn" class="btn btn-primary btn-lg">登录</button>
                </div>
                <div class="col-xs-6">
                    <button class="btn btn-danger btn-lg">重置</button>
                </div>
            </div>
        </div>

    </div>

    <div class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">提示信息</h4>
                </div>
                <div class="modal-body">
                    <p></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                </div>
            </div><!-- /.modal-content -->
        </div><!-- /.modal-dialog -->
    </div><!-- /.modal -->
</body>
</html>
